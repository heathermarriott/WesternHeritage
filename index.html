<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proto Luma Interactive Player</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

#container{
    position:relative;
    width:100%;
    height:100%;
}

/* Video */

video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    background:#000;
}

/* Button Bar */

#controls{
    position:absolute;
    bottom:300px;
    left:80%;
    transform:translateX(-50%);
    display:flex;
    gap:30px;
    z-index:100;
}

button{
    width:880px;
    height:280px;

    font-size:70px;
    font-weight:bold;

    border:none;
    border-radius:18px;

    background:rgba(255,255,255,.90);
    color:#222;

    cursor:pointer;

    transition:.2s;
}

button:hover{
    background:#1976d2;
    color:white;
}

button:active{
    transform:scale(.95);
}

.active{
    background:#1565c0;
    color:white;
}
</style>

</head>

<body>

<div id="container">

    <video
        id="player"
        autoplay
        unmuted
        playsinline>
    </video>

    <div id="controls">

        <button
            id="welcomeBtn"
            onclick="playVideo('welcome')">
            Welcome
        </button>

        <button
            id="exhibitsBtn"
            onclick="playVideo('exhibits')">
            New Exhibits
        </button>

    </div>

</div>

<script>

const player = document.getElementById("player");

const videos = {
    welcome: "videos/welcome.mp4",
    exhibits: "videos/new_exibits.mp4"
};

function clearButtons() {
    document
        .querySelectorAll("button")
        .forEach(btn => btn.classList.remove("active"));
}

function playVideo(name){

    clearButtons();

    if(name === "welcome"){
        document
            .getElementById("welcomeBtn")
            .classList.add("active");
    }

    if(name === "exhibits"){
        document
            .getElementById("exhibitsBtn")
            .classList.add("active");
    }

    player.pause();
    player.src = videos[name];
    player.load();

    player.play().catch(err => {
        console.log("Autoplay prevented:", err);
    });

}

// Load Welcome video on startup
playVideo("welcome");

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prescott Western Heritage Center</title>

<style>
/* General reset to ensure consistent styling across browsers */
*{
    margin:0px;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

/* Basic body styles */
body{
    background:#efe6d3;
    overflow-x:hidden;
}

/* Cowboy Hat Button */
#hatButton{
    position:fixed;
    top:18%;
    left:15px;
    width:70px;
    height:70px;
    border:none;
    background:none;
    cursor:pointer;
    z-index:1001;
    transition:.3s;
    padding:0;
}

/* When the menu is open, move the hat button to the right to align with the menu edge */
body.menu-open #hatButton{
    left:228px;
    transform:rotate(18deg);
    pointer-events:none;
    cursor:default;
}

/* Ensure the image inside the button scales correctly */
#hatButton img{
    width:100%;
    height:100%;
    object-fit:contain;
}

#hatButton:hover{
    transform:scale(1.1);
}

/* Keep the hover effect consistent when the menu is open */
body.menu-open #hatButton:hover{
    transform:rotate(18deg) scale(1.1);
}

/* Off-screen navigation menu styling */
#menu{
    position:fixed;
    top:0;
    left:-280px;
    top: 20%;
    width:280px;
    height:40%;
    background:#6b4423;
    color:white;
    transition:.35s;
    box-shadow:5px 0 15px rgba(0,0,0,.35);
    z-index:1000;
}

/* Class added by JavaScript to slide the menu into view */
#menu.open{
    left:0;
}

/* Style for the menu's close button */
#closeBtn{
    float:right;
    margin:15px;
    border:none;
    background:none;
    color:white;
    font-size:28px;
    cursor:pointer;
}

/* Menu header styling */
#menu h2{
    padding:60px 25px 20px;
    border-bottom:1px solid rgba(255,255,255,.3);
}

/* Menu list styling */
#menu ul{
    list-style:none;
    margin-top:20px;
}

#menu li{
    border-bottom:1px solid rgba(255,255,255,.15);
}

/* Menu link styling */
#menu a{
    display:block;
    padding:18px 25px;
    color:white;
    text-decoration:none;
    font-size:18px;
    transition:.25s;
}

/* Hover effect for menu links */
#menu a:hover{
    background:#8b5a2b;
    padding-left:35px;
}

/* Main content area styling */
main{
    padding:120px 40px;
    text-align:center;
}

/* The div where all dynamic content is loaded */
#content{
    margin-top:10px;
    font-size:22px;
    color:#5a3b1d;
}

/* Styling for individual trivia questions */
.question{
    text-align:left;
    max-width:700px;
    margin:25px auto;
    padding:15px;
    background:#f8f1df;
    border-radius:8px;
}

/* Styling for the "Submit Quiz" button */
#gradeQuiz{
    padding:12px 30px;
    font-size:18px;
    background:#8b5a2b;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#gradeQuiz:hover{
    background:#a66a35;
}

/* Styling for the trivia score display */
#score{
    margin-top:25px;
    color:#5a3b1d;
    font-size:28px;
}

#gameArea{
/* The container for the Cowboy Roundup game */

position:relative;

width:1000px;
height:700px;

margin:auto;

background:#d8c39a;

border:4px solid #6b4423;

border-radius:12px;

overflow:hidden;

}

/* Displays time and score during the game */
#gameStats{

font-size:24px;

padding:15px;

font-weight:bold;

}

/* The clickable horse image */
#horse{

position:absolute;

width:90px;

cursor:pointer;

transition:left .25s, top .25s;

}

#horse:hover{

transform:scale(1.08);

}

/* Container for the "Game Over" message */
#gameOver{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

text-align:center;

}

/* "Play Again" button styling */
#playAgain{

margin-top:20px;

padding:12px 28px;

font-size:20px;

background:#8b5a2b;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

}
</style>
</head>

<body>

<button id="hatButton" title="Open Menu">
    <img src="hat.png" alt="Cowboy Hat">
</button>

<nav id="menu">

    <!-- Button to close the navigation menu -->
    <button id="closeBtn">✕</button>

    <h2>Menu</h2>

    <ul>
        <li><a href="#" data-page="Select Avatar">Select Avatar</a></li>
        <li><a href="#" data-page="Ask a Question">Ask a Question</a></li>
        <li><a href="#" data-page="Prescott Trivia">Prescott Trivia</a></li>
        <li><a href="#" data-page="Cowboy Roundup Game">Cowboy Roundup Game</a></li>
        <li><a href="#" data-page="Settings">Settings</a></li>
    </ul>

</nav>

<main>

<!-- The initial content of the page, which is the avatar selection screen -->
<div id="content">
    <img src="teddy.png" id="centerImage" alt="Avatar" style="max-width:350px; margin: 40px auto;">
    <h2>Select Your Avatar</h2>

    <button class="avatarBtn" data-img="teddy.png">
        Theodore Roosevelt
    </button>

    <button class="avatarBtn" data-img="annie.png">
        Annie Oakley
    </button>

    <button class="avatarBtn" data-img="wyatt.png">
        Wyatt Earp
    </button>
</div>

</main>

<script>
// Get references to the main interactive elements on the page
const hatButton = document.getElementById("hatButton");
const menu = document.getElementById("menu");
const closeBtn = document.getElementById("closeBtn");
const content = document.getElementById("content");

// Variable to store the path of the currently selected avatar image
let currentAvatar = "teddy.png";

// Event listener to open the menu when the hat button is clicked
hatButton.addEventListener("click", () => {
    menu.classList.add("open");
    document.body.classList.add("menu-open");
});

// Event listener to close the menu when the close button is clicked
closeBtn.addEventListener("click", () => {
    menu.classList.remove("open");
    document.body.classList.remove("menu-open");
});

// A reusable function to attach click listeners to the avatar selection buttons
function attachAvatarButtonListeners(){
    document.querySelectorAll(".avatarBtn").forEach(btn => {
        btn.addEventListener("click", function(){
            // Update the current avatar
            currentAvatar = this.dataset.img;

            // Replace the buttons with a confirmation message
            content.innerHTML = `
                <img src="${currentAvatar}" id="centerImage" alt="Avatar" style="max-width:350px; margin: 40px auto;">
                <h2>Avatar Selected!</h2>
                <p>Your adventure is ready to begin. Touch the hat to get started!</p>
            `;
        });
    });
}

// Attach listeners to the avatar buttons that are present on the page when it first loads
attachAvatarButtonListeners();


// Add a click listener to every link in the navigation menu
document.querySelectorAll("#menu a").forEach(item => {

    item.addEventListener("click", function(e){

        e.preventDefault();

        const page = this.dataset.page;
        
        // Close the menu after a selection is made
        menu.classList.remove("open");
        document.body.classList.remove("menu-open");

        const mainDoc = document.querySelector("main");

// --- DYNAMIC PAGE LOADING ---
// Based on the 'data-page' attribute of the clicked link, generate the appropriate HTML.

if(page === "Select Avatar"){
    // Generate the HTML for the avatar selection page
    content.innerHTML = `
        <img src="teddy.png" id="centerImage" alt="Avatar" style="max-width:350px; margin: 40px auto;">
        <h2>Select Your Avatar</h2>

        <button class="avatarBtn" data-img="teddy.png">
            Theodore Roosevelt
        </button>

        <button class="avatarBtn" data-img="annie.png">
            Annie Oakley
        </button>

        <button class="avatarBtn" data-img="wyatt.png">
            Wyatt Earp
        </button>
    `;

    // Re-attach the listeners to the newly created buttons
    attachAvatarButtonListeners();

}
else if(page === "Prescott Trivia"){
    // Generate the HTML for the trivia page
    content.innerHTML = `

    <h2>🤠 Prescott Trivia Challenge</h2>
    <p>Answer all five questions and see how well you know Prescott!</p>

    <form id="triviaForm">

    <div class="question">
    <p><strong>1. Prescott was the first territorial capital of Arizona.</strong></p>

    <label><input type="radio" name="q1" value="a"> True</label><br>
    <label><input type="radio" name="q1" value="b"> False</label>
    </div>

    <div class="question">
    <p><strong>2. What famous street is known for its historic saloons?</strong></p>

    <label><input type="radio" name="q2" value="a"> Whiskey Row</label><br>
    <label><input type="radio" name="q2" value="b"> Main Street</label><br>
    <label><input type="radio" name="q2" value="c"> Frontier Road</label><br>
    <label><input type="radio" name="q2" value="d"> Gold Street</label>
    </div>

    <div class="question">
    <p><strong>3. Which large lake is located just a few miles from downtown Prescott?</strong></p>

    <label><input type="radio" name="q3" value="a"> Lake Pleasant</label><br>
    <label><input type="radio" name="q3" value="b"> Watson Lake</label><br>
    <label><input type="radio" name="q3" value="c"> Roosevelt Lake</label><br>
    <label><input type="radio" name="q3" value="d"> Saguaro Lake</label>
    </div>

    <div class="question">
    <p><strong>4. Prescott is surrounded by which national forest?</strong></p>

    <label><input type="radio" name="q4" value="a"> Coconino National Forest</label><br>
    <label><input type="radio" name="q4" value="b"> Prescott National Forest</label><br>
    <label><input type="radio" name="q4" value="c"> Kaibab National Forest</label><br>
    <label><input type="radio" name="q4" value="d"> Apache-Sitgreaves National Forest</label>
    </div>

    <div class="question">
    <p><strong>5. Prescott's annual rodeo is known as:</strong></p>

    <label><input type="radio" name="q5" value="a"> Arizona Stampede</label><br>
    <label><input type="radio" name="q5" value="b"> World's Oldest Rodeo</label><br>
    <label><input type="radio" name="q5" value="c"> Cowboy Days</label><br>
    <label><input type="radio" name="q5" value="d"> Frontier Roundup</label>
    </div>

    <br>

    <button type="button" id="gradeQuiz">
        Submit Quiz
    </button>
    
    </form>

    <img src="${currentAvatar}" id="centerImage" alt="Avatar" style="max-width:300px; margin: 40px auto;">

    <h3 id="score"></h3>
    `;

    // Add a click listener to the "Submit Quiz" button
    document.getElementById("gradeQuiz").addEventListener("click", function(){

        const answers = {
            q1: "a",
            q2: "a",
            q3: "b",
            q4: "b",
            q5: "b"
        };

        let score = 0;

        // Loop through the correct answers and check the user's selections
        for(const question in answers){

            const selected = document.querySelector(
                `input[name="${question}"]:checked`
            );

            if(selected && selected.value === answers[question]){
                score++;
            }

        }

        // Display the final score
        document.getElementById("score").innerHTML =
            `🏆 You scored <strong>${score}</strong> out of 5!`;

    });

}
else if(page === "Cowboy Roundup Game"){
// Generate the HTML for the game page
content.innerHTML = `

<img src="${currentAvatar}" id="centerImage" alt="Avatar" style="max-width:250px; margin: -80px auto 20px;">

<div id="gameArea">

<h2>🐎 Cowboy Roundup - click on the horse</h2>

<div id="gameStats">
Time: <span id="time">30</span> sec |
Horses Collected:
<span id="score">0</span>
</div>

<img src="horse.png" id="horse">

<div id="gameOver"></div>

</div>

`;

// Call the function to start the game logic
startRoundupGame();

}
else if(page === "Settings"){

    // Generate the HTML for the settings page
    content.innerHTML = `
    <img src="${currentAvatar}" id="centerImage" alt="Avatar" style="max-width:350px; margin: 40px auto;">

    <h2>⚙️ Settings</h2>

    <div class="question">

        <h3>Display Size</h3>
        <p>Select how the application should be displayed.</p>

        
        

        <label>
            <input type="radio" name="displaySize" value="website" checked>
            Website
        </label>
    <br><br>

        <label>
            <input type="radio" name="displaySize" value="proto" >
            Proto Luma
        </label>

    </div>

    <div class="question">

        <h3>Language</h3>
        <p>Select your preferred language.</p>

        <label>
            <input type="radio" name="language" value="english" checked>
            English
        </label>
        <br><br>

        <label>
            <input type="radio" name="language" value="spanish">
            Spanish
        </label>

    </div>

    <button id="saveSettings" style="
        padding:12px 30px;
        font-size:18px;
        background:#8b5a2b;
        color:white;
        border:none;
        border-radius:8px;
        cursor:pointer;
    ">
        Save Settings
    </button>

    <h3 id="settingsSaved" style="margin-top:20px;color:#5a3b1d;"></h3>

    `;

    // Add a click listener to the "Save Settings" button
    document.getElementById("saveSettings").addEventListener("click", function(){

        const display =
            document.querySelector('input[name="displaySize"]:checked').value;

        const language =
            document.querySelector('input[name="language"]:checked').value;

        // Display a confirmation message with the selected settings
        document.getElementById("settingsSaved").innerHTML =
            `✔ Settings saved!<br><br>
             <strong>Display:</strong> ${display === "proto" ? "Website" : "Proto Luma"}<br>
             <strong>Language:</strong> ${language === "english" ? "English" : "Spanish"}`;

    });

}

else{
    // Fallback for any pages that haven't been implemented yet
    content.innerHTML =
    "<h2>" + page + "</h2><br>This section is under construction.";

}

menu.classList.remove("open");

        menu.classList.remove("open");

    });

});

// --- COWBOY ROUNDUP GAME LOGIC ---
function startRoundupGame(){

// Initialize game variables
let score = 0;
let timeLeft = 30;

const horse = document.getElementById("horse");
const scoreLabel = document.getElementById("score");
const timerLabel = document.getElementById("time");
const gameOver = document.getElementById("gameOver");
const gameArea = document.getElementById("gameArea");

// Reset the game display for a new game or replay
gameOver.innerHTML = "";
scoreLabel.innerHTML = "0";
timerLabel.innerHTML = "30";

// Make sure the horse is visible at the start
horse.style.display = "block";

// Function to move the horse to a random position within the game area
function moveHorse(){

    const x = Math.random() * (gameArea.clientWidth-120);
    const y = 70 + Math.random() * (gameArea.clientHeight-180);

    horse.style.left = x + "px";
    horse.style.top = y + "px";

}

// Move the horse to its first position
moveHorse();

horse.onclick=function(){

    score++;

    scoreLabel.innerHTML=score;

    // Move the horse immediately after it's clicked
    moveHorse();

};

// A timer to automatically move the horse every 2 seconds if it's not clicked
const moveTimer = setInterval(moveHorse, 2000);

// The main game countdown timer, runs every second
const countdown=setInterval(function(){

    timeLeft--;

    timerLabel.innerHTML=timeLeft;

    if(timeLeft<=0){

        // Stop the timers when time runs out
        clearInterval(moveTimer);
        clearInterval(countdown);

        // Hide the horse and show the game over message
        horse.style.display="none";

        gameOver.innerHTML=`
        <h2>Time's Up!</h2>
        <h3>You rounded up ${score} horses!</h3>

        <button id="playAgain">
            Play Again
        </button>
        `;

        // Add a listener to the "Play Again" button
        document.getElementById("playAgain").addEventListener("click", function(){

    // Remove the game over message and button
    gameOver.innerHTML = "";

    // Restart the game
    startRoundupGame();

});

    }

},1000);

}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Prescott Western Heritage Center</title>

<style>
/* ==========================================================================
   QUICK CUSTOMIZATION
   Set these two values to the Proto Luma's real screen resolution (in CSS
   pixels). Everything else on the page - the card size/position, buttons,
   fonts, the menu, the game board - is derived from these two numbers, so
   changing them re-tunes the whole layout automatically.

   The page builds a fixed-size "stage" at exactly this resolution and then
   scales it (via JS, see bottom of file) to fit whatever browser window
   you're previewing in - so you always see the true composition, just
   shrunk/grown to fit your monitor, instead of a cropped slice of it.
   ========================================================================== */
:root{
    --device-width: 2180px;
    --device-height: 3840px;

    /* The original design was tuned assuming a viewport around this wide.
       --scale is the multiplier applied to every fixed-px value below so
       the whole layout grows/shrinks proportionally with --device-width. */
    --baseline-width: 550px;
    --scale: calc(var(--device-width) / var(--baseline-width));
}

/* General reset to ensure consistent styling across browsers */
*{
    margin:0px;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
    -webkit-tap-highlight-color:transparent;
}

/* Basic body styles - locked to the viewport, kiosk-style (no page scroll/bounce).
   Background here only shows up as "letterbox" bars around the stage when the
   browser window's aspect ratio doesn't match the device's - on the real
   device (where the window IS the device) it will never be visible. */
html, body{
    height:100%;
    overflow:hidden;
    overscroll-behavior:none;
}

body{
    background:#111;
    touch-action:manipulation;
    -webkit-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
}

/* Text inside form fields should still be selectable/usable normally */
input, textarea{
    -webkit-user-select:auto;
    user-select:auto;
}

/* The fixed-resolution "virtual screen". JS scales this to fit the real
   browser window (see the script at the bottom). Everything inside it is
   positioned/sized against ITS dimensions, not the actual browser window -
   that's what makes the two variables above a single source of truth. */
#stage{
    position:fixed;
    top:50%;
    left:50%;
    width:var(--device-width);
    height:var(--device-height);
    transform:translate(-50%, -50%);
    transform-origin:center center;
    overflow:hidden;
    background:#efe6d3;
}

/* background teddy roosevelt video - persistent, lives at the stage's root so
   it is never removed/recreated by page navigation and always plays
   regardless of which page or setting the user picks */
#introVideo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    object-fit:cover;

    z-index:-1;
    pointer-events:none;
}

#avatarOverlay{
    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:0 5%;

    text-align:center;
}

.avatarBtn{
    width:min(70%, calc(320px * var(--scale)));
    margin:calc(14px * var(--scale)) 0;
    padding:calc(18px * var(--scale));

    font-size:calc(24px * var(--scale));

    background:#8b5a2b;
    color:white;

    border:none;
    border-radius:calc(12px * var(--scale));

    cursor:pointer;
    touch-action:manipulation;
}

/* Cowboy Hat Button */
#hatButton{
    position:fixed;
    top:18%;
    left:calc(15px * var(--scale));
    width:calc(70px * var(--scale));
    height:calc(70px * var(--scale));
    border:none;
    background:none;
    cursor:pointer;
    z-index:1001;
    transition:.3s;
    padding:0;
    touch-action:manipulation;
}

/* When the menu is open, move the hat button to the right to align with the menu edge */
body.menu-open #hatButton{
    left:calc(228px * var(--scale));
    transform:rotate(18deg);
    pointer-events:none;
    cursor:default;
}

/* Ensure the image inside the button scales correctly */
#hatButton img{
    width:100%;
    height:100%;
    object-fit:contain;
}

#hatButton:hover{
    transform:scale(1.1);
}

/* Keep the hover effect consistent when the menu is open */
body.menu-open #hatButton:hover{
    transform:rotate(18deg) scale(1.1);
}

/* Off-screen navigation menu styling */
#menu{
    position:fixed;
    top:20%;
    left:calc(-280px * var(--scale));
    width:min(82%, calc(280px * var(--scale)));
    height:60%;
    background:#6b4423;
    color:white;
    transition:.35s;
    box-shadow: calc(5px * var(--scale)) 0 calc(15px * var(--scale)) rgba(0,0,0,.35);
    z-index:1000;
    overflow-y:auto;
}

/* Class added by JavaScript to slide the menu into view */
#menu.open{
    left:0;
}

/* Style for the menu's close button */
#closeBtn{
    float:right;
    margin:calc(15px * var(--scale));
    border:none;
    background:none;
    color:white;
    font-size:calc(28px * var(--scale));
    cursor:pointer;
    touch-action:manipulation;
}

/* Menu header styling */
#menu h2{
    padding:calc(60px * var(--scale)) calc(25px * var(--scale)) calc(20px * var(--scale));
    border-bottom:calc(1px * var(--scale)) solid rgba(255,255,255,.3);
    font-size:calc(28px * var(--scale));
}

/* Menu list styling */
#menu ul{
    list-style:none;
    margin-top:calc(20px * var(--scale));
}

#menu li{
    border-bottom:calc(1px * var(--scale)) solid rgba(255,255,255,.15);
}

/* Menu link styling */
#menu a{
    display:block;
    padding:calc(18px * var(--scale)) calc(25px * var(--scale));
    color:white;
    text-decoration:none;
    font-size:calc(18px * var(--scale));
    transition:.25s;
    touch-action:manipulation;
}

/* Hover effect for menu links */
#menu a:hover{
    background:#8b5a2b;
    padding-left:calc(35px * var(--scale));
}

/* Main content area - centers the card in the full available space instead
   of parking it near the top. Scrolls internally only if content (like the
   trivia form) is taller than the screen. */
main{
    position:relative;
    width:100%;
    height:100%;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;

    display:flex;
    flex-direction:column;
    justify-content:safe center;
    align-items:center;

    padding:calc(70px * var(--scale)) calc(20px * var(--scale)) calc(50px * var(--scale));
    text-align:center;
}

/* When the avatar page is showing (full-bleed video look), let its content
   stretch the full stage instead of being centered/padded like a card. */
main:has(#content.transparent){
    padding:0;
    justify-content:stretch;
    align-items:stretch;
}

/* The div where all dynamic content is loaded.
   By default it's a translucent "card" floating over the background video
   so text stays legible on every page - sized as a real fraction of the
   device width so it doesn't look lost on a large screen. */
#content{
    font-size:calc(26px * var(--scale));
    color:#5a3b1d;
    background:rgba(239,230,211,.94);
    border-radius:calc(20px * var(--scale));
    padding:calc(28px * var(--scale));
    max-width:min(90%, calc(620px * var(--scale)));
    width:100%;
    box-shadow:0 calc(8px * var(--scale)) calc(24px * var(--scale)) rgba(0,0,0,.25);
}

/* The avatar page wants the full-bleed video look instead of the card,
   so this class strips the card styling back out and lets it fill the stage. */
#content.transparent{
    background:none;
    box-shadow:none;
    padding:0;
    max-width:none;
    border-radius:0;
    width:100%;
    height:100%;
}

/* Styling for individual trivia questions */
.question{
    text-align:left;
    max-width:min(94%, calc(700px * var(--scale)));
    margin:calc(25px * var(--scale)) auto;
    padding:calc(15px * var(--scale));
    background:rgba(248,241,223,0.4);
    border-radius:calc(8px * var(--scale));
    font-size:calc(22px * var(--scale));
}

/* Styling for the "Submit Quiz" button */
#gradeQuiz{
    padding:calc(12px * var(--scale)) calc(30px * var(--scale));
    font-size:calc(18px * var(--scale));
    background:#8b5a2b;
    color:white;
    border:none;
    border-radius:calc(8px * var(--scale));
    cursor:pointer;
    touch-action:manipulation;
}

#gradeQuiz:hover{
    background:#a66a35;
}

/* Styling for the trivia score display */
#score{
    margin-top:calc(25px * var(--scale));
    color:#5a3b1d;
    font-size:calc(28px * var(--scale));
}


/* The container for the Cowboy Roundup game */
#gameArea{
    position:relative;

    width:min(92%, calc(480px * var(--scale)));
    aspect-ratio:9 / 16;

    margin:calc(10px * var(--scale)) auto;

    background:#d8c39a;

    border:calc(4px * var(--scale)) solid #6b4423;
    border-radius:calc(16px * var(--scale));

    overflow:hidden;
}

/* Displays time and score during the game */
#gameStats{
    font-size:calc(24px * var(--scale));
    padding:calc(15px * var(--scale));
    font-weight:bold;
}

/* The clickable horse image */
#horse{
    position:absolute;
    width:calc(90px * var(--scale));
    cursor:pointer;
    transition:left .25s, top .25s;
    touch-action:manipulation;
}

#horse:hover{
    transform:scale(1.08);
}

/* Container for the "Game Over" message */
#gameOver{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* "Play Again" button styling */
#playAgain{
    margin-top:calc(20px * var(--scale));
    padding:calc(12px * var(--scale)) calc(28px * var(--scale));
    font-size:calc(20px * var(--scale));
    background:#8b5a2b;
    color:white;
    border:none;
    border-radius:calc(8px * var(--scale));
    cursor:pointer;
    touch-action:manipulation;
}

/* "Ask a Question" page specific styles */
#askQuestionContainer {
    position: relative;
    width: 100%;
}

#askQuestionList {
    transition: transform 0.4s ease-in-out, opacity 0.4s ease-in-out;
    transform: translateX(0);
    opacity: 1;
}

#askQuestionList.collapsed {
    transform: translateX(-120%);
    opacity: 0;
    position: absolute; /* Collapse without affecting layout */
}

#showQuestionsBtn {
    position: fixed;
    top: 18%;
    right: calc(15px * var(--scale));
    width: calc(70px * var(--scale));
    height: calc(70px * var(--scale));
    padding: 0;
    font-size: calc(40px * var(--scale));
    font-weight: bold;
    background: #8b5a2b;
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: calc(3px * var(--scale)) calc(3px * var(--scale)) calc(8px * var(--scale)) rgba(0,0,0,.3);
    touch-action: manipulation;
    z-index: 900;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease-in-out;
}

#showQuestionsBtn.visible {
    opacity: 1;
    pointer-events: auto;
}


</style>

<body>

<div id="stage">

    <!-- Persistent background video. This lives at the stage root (not inside
         #content) so page navigation and settings changes never remove it -
         it always keeps playing in the back. -->
    <video
        id="introVideo"
        autoplay
        loop
        playsinline
        webkit-playsinline
        preload="auto">

        <source src="TeddyLowRes.mp4" type="video/mp4">

    </video>

    <button id="hatButton" title="Open Menu">
        <img src="hat.png" alt="Cowboy Hat">
    </button>

    <nav id="menu">

        <!-- Button to close the navigation menu -->
        <button id="closeBtn">✕</button>

        <h2 data-lang-key="menu.title">Menu</h2>

        <ul>
            <li><a href="#" data-page="Select Avatar" data-lang-key="menu.selectAvatar">Select Avatar</a></li>
            <li><a href="#" data-page="Ask a Question" data-lang-key="menu.askQuestion">Ask a Question</a></li>
            <li><a href="#" data-page="Prescott Trivia" data-lang-key="menu.prescottTrivia">Prescott Trivia</a></li>
            <li><a href="#" data-page="Cowboy Roundup Game" data-lang-key="menu.cowboyRoundupGame">Cowboy Roundup Game</a></li>
            <li><a href="#" data-page="Settings" data-lang-key="menu.settings">Settings</a></li>
        </ul>

    </nav>

    <main>

        <!-- The initial content of the page, which is the avatar selection screen -->
        <div id="content"></div>

    </main>

</div>

<script>
// Get references to the main interactive elements on the page
const hatButton = document.getElementById("hatButton");
const menu = document.getElementById("menu");
const closeBtn = document.getElementById("closeBtn");
const content = document.getElementById("content");
const introVideo = document.getElementById("introVideo");

// --- KEEP THE BACKGROUND VIDEO ALWAYS PLAYING ---
// No matter what page or setting the user picks, if the video is ever paused
// (e.g. by a stray browser/OS event), immediately resume it.
introVideo.addEventListener("pause", () => {
    introVideo.play().catch(() => {});
});
document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
        introVideo.play().catch(() => {});
    }
});
function switchVideo(filename) {
    const source = introVideo.querySelector("source");
    source.src = filename;
    introVideo.load();
    introVideo.play().catch(() => {});
}

// --- STATE VARIABLES ---
let currentAvatar = "teddy.png";
let currentPage = "Select Avatar"; // Track the current page for language switching
let translations = {}; // To store the loaded language JSON

let askQuestionCollapsed = false;
let lastAskedLabel = "";

// --- MENU CONTROLS ---

// Event listener to open the menu when the hat button is clicked
hatButton.addEventListener("click", () => {
    menu.classList.add("open");
    document.body.classList.add("menu-open");
});

// Event listener to close the menu when the close button is clicked
closeBtn.addEventListener("click", () => {
    menu.classList.remove("open");
    document.body.classList.remove("menu-open");
});

// --- PAGE AND CONTENT LOGIC ---

// A reusable function to attach click listeners to the avatar selection buttons
function attachAvatarButtonListeners(){
    document.querySelectorAll(".avatarBtn").forEach(btn => {
        btn.addEventListener("click", function(){
            // Update the current avatar
            currentAvatar = this.dataset.img;

            // Avatar has been picked - switch back to the card layout for the
            // confirmation message (video keeps playing behind it either way)
            content.classList.remove("transparent");

            // Replace the buttons with a confirmation message
            content.innerHTML = `
                <img src="${currentAvatar}" id="centerImage" alt="Avatar" style="max-width:min(60%, calc(220px * var(--scale))); margin: 0 auto calc(20px * var(--scale)); display:block;">
                <h2 data-lang-key="avatar.selectedHeading">${translations.avatar.selectedHeading}</h2>
                <p data-lang-key="avatar.selectedMessage">${translations.avatar.selectedMessage}</p>
            `;
        });
    });
}

// --- DYNAMIC PAGE LOADING ---
// Based on the 'data-page' attribute of the clicked link, generate the appropriate HTML.
function renderPage(page) {
    currentPage = page; // Update the current page tracker

    if (page === "Select Avatar") {

        // Full-bleed video look for avatar selection: strip the card styling
        content.classList.add("transparent");

        // Generate the HTML for the avatar selection page (video itself lives
        // at the stage root now and is already playing behind this)
        content.innerHTML = `
<div id="avatarOverlay">

    <h2 style="
        color:white;
        text-shadow:calc(3px * var(--scale)) calc(3px * var(--scale)) calc(8px * var(--scale)) black;
        margin-bottom:calc(40px * var(--scale));
        font-size:calc(34px * var(--scale));
    ">
        ${translations.avatar.heading}
    </h2>

    <button class="avatarBtn"
            data-img="teddy.png">
        ${translations.avatar.theodoreRoosevelt}
    </button>

    <button class="avatarBtn"
            data-img="annie.png">
        ${translations.avatar.annieOakley}
    </button>

    <button class="avatarBtn"
            data-img="wyatt.png">
        ${translations.avatar.wyattEarp}
    </button>

</div>
`;
        attachAvatarButtonListeners();
    
 } else if (page === "Prescott Trivia") {

        // Card layout over the video for every other page
        content.classList.remove("transparent");

        // Generate the HTML for the trivia page
        content.innerHTML = `
            <h2 data-lang-key="trivia.heading">${translations.trivia.heading}</h2>
            <p data-lang-key="trivia.intro">${translations.trivia.intro}</p>

            <form id="triviaForm">
                <div class="question">
                    <p><strong>1. ${translations.trivia.q1}</strong></p>
                    <label><input type="radio" name="q1" value="a"> ${translations.trivia.q1True}</label><br>
                    <label><input type="radio" name="q1" value="b"> ${translations.trivia.q1False}</label>
                </div>

                <div class="question">
                    <p><strong>2. ${translations.trivia.q2}</strong></p>
                    <label><input type="radio" name="q2" value="a"> ${translations.trivia.q2A}</label><br>
                    <label><input type="radio" name="q2" value="b"> ${translations.trivia.q2B}</label><br>
                    <label><input type="radio" name="q2" value="c"> ${translations.trivia.q2C}</label><br>
                    <label><input type="radio" name="q2" value="d"> ${translations.trivia.q2D}</label>
                </div>

                <div class="question">
                    <p><strong>3. ${translations.trivia.q3}</strong></p>
                    <label><input type="radio" name="q3" value="a"> ${translations.trivia.q3A}</label><br>
                    <label><input type="radio" name="q3" value="b"> ${translations.trivia.q3B}</label><br>
                    <label><input type="radio" name="q3" value="c"> ${translations.trivia.q3C}</label><br>
                    <label><input type="radio" name="q3" value="d"> ${translations.trivia.q3D}</label>
                </div>

                <div class="question">
                    <p><strong>4. ${translations.trivia.q4}</strong></p>
                    <label><input type="radio" name="q4" value="a"> ${translations.trivia.q4A}</label><br>
                    <label><input type="radio" name="q4" value="b"> ${translations.trivia.q4B}</label><br>
                    <label><input type="radio" name="q4" value="c"> ${translations.trivia.q4C}</label><br>
                    <label><input type="radio" name="q4" value="d"> ${translations.trivia.q4D}</label>
                </div>

                <div class="question">
                    <p><strong>5. ${translations.trivia.q5}</strong></p>
                    <label><input type="radio" name="q5" value="a"> ${translations.trivia.q5A}</label><br>
                    <label><input type="radio" name="q5" value="b"> ${translations.trivia.q5B}</label><br>
                    <label><input type="radio" name="q5" value="c"> ${translations.trivia.q5C}</label><br>
                    <label><input type="radio" name="q5" value="d"> ${translations.trivia.q5D}</label>
                </div>
                <br>
                <button type="button" id="gradeQuiz" data-lang-key="trivia.submit">
                    ${translations.trivia.submit}
                </button>
            </form>

            <img src="${currentAvatar}" id="centerImage" alt="Avatar" style="max-width:min(50%, calc(200px * var(--scale))); margin: calc(30px * var(--scale)) auto 0; display:block;">
            <h3 id="triviaScore"></h3>
        `;

        // Add a click listener to the "Submit Quiz" button
        document.getElementById("gradeQuiz").addEventListener("click", function () {
        const answers = {
            q1: "a",
            q2: "a",
            q3: "b",
            q4: "b",
            q5: "b"
        };
        let score = 0;

        // Loop through the correct answers and check the user's selections
        for (const question in answers) {
            const selected = document.querySelector(
                `input[name="${question}"]:checked`
            );

            if(selected && selected.value === answers[question]){
                score++;
            }
        }

        // Display the final score
        document.getElementById("triviaScore").innerHTML = translations.trivia.scoreResult.replace("{score}", `<strong>${score}</strong>`);
        });

    } else if (page === "Cowboy Roundup Game") {

        content.classList.remove("transparent");

        // Generate the HTML for the game page
        content.innerHTML = `
            <img src="${currentAvatar}" id="centerImage" alt="Avatar" style="max-width:min(30%, calc(120px * var(--scale))); margin: 0 auto calc(12px * var(--scale)); display:block;">
            <div id="gameArea">
                <h2 data-lang-key="game.heading">${translations.game.heading}</h2>
                <div id="gameStats">
                    <span data-lang-key="game.time">${translations.game.time}</span> <span id="time">30</span> <span data-lang-key="game.seconds">${translations.game.seconds}</span> |
                    <span data-lang-key="game.horsesCollected">${translations.game.horsesCollected}</span>
                    <span id="gameScore">0</span>
                </div>
                <img src="horse.png" id="horse">
                <div id="gameOver"></div>
            </div>
        `;
        // Call the function to start the game logic
        startRoundupGame();

    } else if (page === "Settings") {

        content.classList.remove("transparent");

        const savedDisplaySize = localStorage.getItem("displaySize") || "website";
        const savedLanguage = localStorage.getItem("language") || "en";
        // Generate the HTML for the settings page
        content.innerHTML = `
            <img src="${currentAvatar}" id="centerImage" alt="Avatar" style="max-width:min(50%, calc(200px * var(--scale))); margin: 0 auto calc(20px * var(--scale)); display:block;">
            <h2 data-lang-key="settings.heading">${translations.settings.heading}</h2>

            <div class="question">
                <h3 data-lang-key="settings.languageHeading">${translations.settings.languageHeading}</h3>
                <p data-lang-key="settings.languageIntro">${translations.settings.languageIntro}</p>
                <label>
                    <input type="radio" name="language" value="en" ${savedLanguage === 'en' ? 'checked' : ''}>
                    <span data-lang-key="settings.english">${translations.settings.english}</span>
                </label>
                <br><br>
                <label>
                    <input type="radio" name="language" value="es" ${savedLanguage === 'es' ? 'checked' : ''}>
                    <span data-lang-key="settings.spanish">${translations.settings.spanish}</span>
                </label>
            </div>

            <button id="saveSettings" style="padding:calc(12px * var(--scale)) calc(30px * var(--scale)); font-size:calc(18px * var(--scale)); background:#8b5a2b; color:white; border:none; border-radius:calc(8px * var(--scale)); cursor:pointer;" data-lang-key="settings.save">
                ${translations.settings.save}
            </button>

            <h3 id="settingsSaved" style="margin-top:calc(20px * var(--scale));color:#5a3b1d;"></h3>
        `;

        // Add event listener for language change
        document.querySelectorAll('input[name="language"]').forEach(radio => {
            radio.addEventListener('change', function() {
                loadLanguage(this.value);
            });
        });

        // Add a click listener to the "Save Settings" button
        document.getElementById("saveSettings").addEventListener("click", function () {
        const display =
            document.querySelector('input[name="displaySize"]:checked').value;
            const language = document.querySelector('input[name="language"]:checked').value;

            // Persist settings to localStorage
            // (Note: whatever the user picks here, the background video is
            // never tied to this setting - it keeps playing regardless.)
            localStorage.setItem("displaySize", display);

            // Display a confirmation message with the selected settings
            document.getElementById("settingsSaved").innerHTML =
                `${translations.settings.saved}<br><br>
                 <strong>${translations.settings.displayLabel}</strong> ${display === "proto" ? translations.settings.protoLuma : translations.settings.website}<br>
                 <strong>${translations.settings.languageLabel}</strong> ${language === "en" ? translations.settings.english : translations.settings.spanish}`;
        });
 } else if (page === "Ask a Question") {

        content.classList.remove("transparent");

// --- LANGUAGE AND TRANSLATION ---

async function loadLanguage(language) {
    try {
        const response = await fetch(`${language}.json`);
        translations = await response.json();
        localStorage.setItem("language", language);
        applyTranslations();
    } catch (error) {
        console.error("Error loading language file:", error);
    }
}

function applyTranslations() {
    document.documentElement.lang = localStorage.getItem("language") || "en";
    
    // Update all elements with a data-lang-key attribute
    document.querySelectorAll('[data-lang-key]').forEach(element => {
        const key = element.getAttribute('data-lang-key');
        const keys = key.split('.');
        let text = translations;
        for (const k of keys) {
            text = text[k];
        }
        if (text) {
            element.textContent = text;
        }
    });

    // Re-render the current page with the new translations
    renderPage(currentPage);
}

// --- VOICE COMMAND RECOGNITION ---
function startVoiceRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Sorry, your browser doesn't support voice commands.");
        return;
    }

    const recognition = new SpeechRecognition();
    const currentLang = localStorage.getItem("language") || "en";
    
    // Map app language to speech recognition language codes
    const langMap = { "en": "en-US", "es": "es-MX" };
    recognition.lang = langMap[currentLang] || "en-US";

    const voiceStatus = document.getElementById("voiceStatus");

    // Helper function to remove accents for more flexible matching
    const normalizeText = (text) => {
        return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    };

    recognition.onstart = () => {
        voiceStatus.textContent = "Listening...";
        introVideo.muted = true; // Mute the video to prevent audio interference
        voiceStatus.style.display = "block";
    };

    recognition.onresult = (event) => {
        const spokenText = event.results[0][0].transcript.toLowerCase().trim();
        console.log("Heard:", spokenText);

        const questionButtons = document.querySelectorAll("#askQuestionList .avatarBtn");
        let matchFound = false;

        for (const btn of questionButtons) {
            const buttonText = btn.textContent.toLowerCase().trim().replace(/[¿?.,]/g, ''); // Clean button text
            
            // --- Fuzzy Matching Logic ---
            // Normalize both spoken text and button text to remove accents.
            const normalizedSpoken = normalizeText(spokenText);
            const normalizedButton = normalizeText(buttonText);

            // Check if all words from the button text are present in the spoken text.
            const allKeywordsFound = normalizedButton.split(' ').every(keyword => normalizedSpoken.includes(keyword));
            if (allKeywordsFound) {
                voiceStatus.textContent = `Found: "${btn.textContent}"`;
                btn.click(); // Trigger the question
                matchFound = true;
                break;
            }
        }

        if (!matchFound) {
            voiceStatus.textContent = "Sorry, I didn't recognize that question.";
        }
    };

    recognition.onerror = (event) => {
        console.error("Voice recognition error:", event.error);
        if (event.error === 'no-speech') {
            voiceStatus.textContent = "I didn't hear anything.";
        } else {
            voiceStatus.textContent = "Error listening.";
        }
    };

    recognition.onend = () => {
        // Hide the status message after a short delay
        introVideo.muted = false; // Unmute the video when recognition is finished
        setTimeout(() => {
            voiceStatus.style.display = "none";
        }, 2500);
    };

    recognition.start();
}


// --- COWBOY ROUNDUP GAME LOGIC ---
function startRoundupGame(){

// Initialize game variables
let score = 0;
let timeLeft = 30;

const horse = document.getElementById("horse");
const scoreLabel = document.getElementById("gameScore");
const timerLabel = document.getElementById("time");
const gameOver = document.getElementById("gameOver");
const gameArea = document.getElementById("gameArea");

// Reset the game display for a new game or replay
gameOver.innerHTML = "";
scoreLabel.innerHTML = "0";
timerLabel.innerHTML = "30";

// Make sure the horse is visible at the start
horse.style.display = "block";

// Function to move the horse to a random position within the game area
function moveHorse(){

    const x = Math.random() * (gameArea.clientWidth-120);
    const y = 70 + Math.random() * (gameArea.clientHeight-180);

    horse.style.left = x + "px";
    horse.style.top = y + "px";

}

// Move the horse to its first position
moveHorse();

horse.onclick=function(){

    score++;

    scoreLabel.innerHTML=score;

    // Move the horse immediately after it's clicked
    moveHorse();

};

// A timer to automatically move the horse every 2 seconds if it's not clicked
const moveTimer = setInterval(moveHorse, 2000);

// The main game countdown timer, runs every second
const countdown=setInterval(function(){

    timeLeft--;

    timerLabel.innerHTML=timeLeft;

    if(timeLeft<=0){

        // Stop the timers when time runs out
        clearInterval(moveTimer);
        clearInterval(countdown);

        // Hide the horse and show the game over message
        horse.style.display="none";

        gameOver.innerHTML=`
        <h2 data-lang-key="game.timeUp">${translations.game.timeUp}</h2>
        <h3 data-lang-key="game.roundedUp">${translations.game.roundedUp.replace('{score}', score)}</h3>

        <button id="playAgain">
            ${translations.game.playAgain}
        </button>
        `;

        // Add a listener to the "Play Again" button
        document.getElementById("playAgain").addEventListener("click", function(){

    // Remove the game over message and button
    gameOver.innerHTML = "";

    // Restart the game
    startRoundupGame();

});

}

},1000);

}

<script>
// --- STAGE SCALING (device preview) ---
// Shrinks/grows the fixed --device-width x --device-height stage to fit
// whatever browser window it's actually running in, preserving the true
// aspect ratio - so you always see the exact composition, just scaled,
// rather than a cropped slice of it. On the real device (where the browser
// window IS the device's screen) this resolves to a scale of ~1.
const stageEl = document.getElementById("stage");

function fitStage(){
    const rootStyles = getComputedStyle(document.documentElement);
    const deviceWidth = parseFloat(rootStyles.getPropertyValue("--device-width"));
    const deviceHeight = parseFloat(rootStyles.getPropertyValue("--device-height"));

    const scale = Math.min(
        window.innerWidth / deviceWidth,
        window.innerHeight / deviceHeight
    );

    stageEl.style.transform = `translate(-50%, -50%) scale(${scale})`;
}

window.addEventListener("resize", fitStage);
fitStage();
</script>
